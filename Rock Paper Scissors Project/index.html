<!DOCTYPE html>
<head>
<title>Rock Paper Scissors</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Rock Paper Scissors Game</h1>
  <div class="container">
  <div class="divs">
    <button onclick="countDown(0)">Rock</button>
    <button onclick="countDown(1)">Paper</button>
    <button onclick="countDown(2)">Scissors</button>
  </div>

  <div id="results">
    <h3 id="message"></h3>
    <br>
    <div id="choicesDisplay"></div>
    <br><br><br>
    <h3 id="compOutput">Computer Score: 0</h3>
    <h3 id="userOutput">User Score: 0</h3>
  </div>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
