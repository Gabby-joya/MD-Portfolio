<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Countdown Widget</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Optional: Your own CSS -->
    <link href="styles.css" rel="stylesheet">

    <!-- Optional: Add a little custom style for your countdown -->
    <style>
        #countdown-widget {
            text-align: center;
            margin-top: 50px;
        }
        .time-box {
            display: inline-block;
            margin: 10px;
            text-align: center;
        }
        .flip {
            font-size: 3rem;
            font-weight: bold;
        }
        .label {
            font-size: 1rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- Countdown Widget -->
    <div id="countdown-widget">
        <h2>Countdown:</h2>

        <div id="timer">
            <div class="time-box">
                <div class="flip">
                    <span id="days" class="num">00</span>
                </div>
                <div class="label">Days</div>
            </div>

            <div class="time-box">
                <div class="flip">
                    <span id="hours" class="num">00</span>
                </div>
                <div class="label">Hours</div>
            </div>

            <div class="time-box">
                <div class="flip">
                    <span id="minutes" class="num">00</span>
                </div>
                <div class="label">Minutes</div>
            </div>

            <div class="time-box">
                <div class="flip">
                    <span id="seconds" class="num">00</span>
                </div>
                <div class="label">Seconds</div>
            </div>
        </div>
    </div>

    <!-- Example Bootstrap Modal (for Advent Calendar or other use) -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLabel">Modal Title</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            Modal content goes here...
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js" defer></script>

</body>
</html>
